name: Export Windows Neovim config

on:
  push:
    branches:
      - main
      - master
    paths:
      - "config/**"
      - "flake.nix"
      - "flake.lock"
      - "windows/export.sh"
      - "windows/export-lib.nix"
      - "windows/bootstrap/**"
      - "windows/DEPENDENCIES.md"
      - ".github/workflows/export-windows-config.yml"
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Export Windows config
        run: |
          chmod +x windows/export.sh
          ./windows/export.sh x86_64-linux

      - name: Publish rolling pre-release
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete windows-latest -y 2>/dev/null || true
          git push --delete origin refs/tags/windows-latest 2>/dev/null || true
          gh release create windows-latest \
            --prerelease \
            --title "Windows Neovim config (latest)" \
            --notes "Auto-generated portable Neovim config from commit ${GITHUB_SHA}." \
            windows/generated/init.lua \
            windows/generated/plugins.json \
            windows/generated/dependencies.json

      - name: Upload to published release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            windows/generated/init.lua \
            windows/generated/plugins.json \
            windows/generated/dependencies.json \
            --clobber
